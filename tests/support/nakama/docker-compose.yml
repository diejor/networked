# Local Nakama stack for live transport + storage tests.
#
# Start:   docker compose -f tests/support/nakama/docker-compose.yml up -d
# Stop:    docker compose -f tests/support/nakama/docker-compose.yml down
# Wipe:    docker compose -f tests/support/nakama/docker-compose.yml down -v
#
# Once healthy:
#   - client API + socket : 127.0.0.1:7350   (server key "defaultkey")
#   - developer console    : http://127.0.0.1:7351   (admin / password)
#
# The live tests read the networked/tests/nakama_host project setting first, then
# fall back to the NAKAMA_TEST_HOST env var. Point either here:
#   project.godot: networked/tests/nakama_host = "127.0.0.1"
#   env: NAKAMA_TEST_HOST=127.0.0.1  (PowerShell: $env:NAKAMA_TEST_HOST = "127.0.0.1")
# When neither is set, the live tests early-return as a no-op so CI stays green.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=nakama
      - POSTGRES_PASSWORD=localdb
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nakama:
    image: heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama-local
        --database.address postgres:localdb@postgres:5432/nakama
        --logger.level INFO
        --session.token_expiry_sec 7200
        --socket.server_key defaultkey
    ports:
      - "7349:7349"   # gRPC
      - "7350:7350"   # client API + websocket (matches Nakama.gd DEFAULT_PORT)
      - "7351:7351"   # developer console
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  data:
