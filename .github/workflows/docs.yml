name: Docs build verification

# Pure CI check: confirms the doctool → make_rst → sphinx-build pipeline still
# works. Publication is handled by Read the Docs (.readthedocs.yml).

on:
  push:
    branches: [main, master]
    paths:
      - "addons/networked/**/*.gd"
      - "docs/**"
      - ".github/workflows/docs.yml"
      - ".readthedocs.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "addons/networked/**/*.gd"
      - "docs/**"
      - ".github/workflows/docs.yml"
      - ".readthedocs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.event.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot_linux.x86_64
          key: godot-4.7-beta1-linux

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip Godot_v4.6.2-stable_linux.x86_64.zip
          mv Godot_v4.6.2-stable_linux.x86_64 ../godot_linux.x86_64
          chmod +x ../godot_linux.x86_64

      - name: Generate XML via godot --doctool
        run: ../godot_linux.x86_64 --doctool api --gdscript-docs res://addons/networked --headless --path .. --quit 2>/dev/null || true

      - name: Filter private members
        run: python tools/filter_private.py api api_filtered

      - name: Generate RST
        run: python tools/make_rst.py api_filtered --output classes

      - name: Build HTML with Sphinx (warnings as errors)
        run: python -m sphinx -T -W --keep-going -b html -d _build/doctrees . _build/html

      - name: Upload built docs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 7
