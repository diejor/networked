name: CI
run-name: ${{ github.head_ref || github.ref_name }} - CI Test Run

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: ci-tests-${{ github.event.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: "GdUnit4 Tests (${{ matrix.godot-version }})"
    runs-on: 'ubuntu-22.04'
    timeout-minutes: 15
    continue-on-error: ${{ matrix.godot-version != '4.7' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - godot-version: '4.4'
            gdunit-version: 'v5.1.0'
          - godot-version: '4.5'
            gdunit-version: 'installed'
          - godot-version: '4.6'
            gdunit-version: 'installed'
          - godot-version: '4.7'
            gdunit-version: 'installed'
    permissions:
      actions: write
      checks: write
      contents: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run GdUnit4 Tests
        uses: MikeSchulze/gdUnit4-action@v1.0.2
        with:
          godot-version: ${{ matrix.godot-version }}
          # Use the repo's vendored addons/gdUnit4 (6.0.0) instead of cloning
          # gdUnit4 'latest' at run time, so CI runs the same gdUnit as local.
          version: ${{ matrix.gdunit-version }}
          paths: |
            res://tests/
            res://examples/
          timeout: 10
          report-name: test_report_${{ matrix.godot-version }}.xml
