name: Docs linkcheck

# Catches dead external links — particularly important because make_rst.py
# generates docs.godotengine.org links heuristically and Godot occasionally
# renames or moves class pages.

on:
  schedule:
    # Mondays 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify make_rst.py is in sync with vendor + patches
        run: python tools/build_make_rst.py --check

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot_linux.x86_64
          key: godot-4.7-beta1-linux

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip Godot_v4.6.2-stable_linux.x86_64.zip
          mv Godot_v4.6.2-stable_linux.x86_64 ../godot_linux.x86_64
          chmod +x ../godot_linux.x86_64

      - name: Regenerate class RST
        run: |
          ../godot_linux.x86_64 --doctool api --gdscript-docs res://addons/networked --headless --path .. --quit 2>/dev/null || true
          python tools/filter_private.py api api_filtered
          python tools/make_rst.py api_filtered --output classes

      - name: Run sphinx linkcheck
        run: python -m sphinx -b linkcheck -d _build/doctrees . _build/linkcheck

      - name: Upload linkcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkcheck-report
          path: docs/_build/linkcheck
          retention-days: 30
