name: Deploy Bomber demo to itch.io

# Publishes examples/bomber to https://diejor.itch.io/bomber after the CI
# workflow passes on main. The committed default main scene stays
# examples/daily/Main.tscn; this job temporarily swaps run/main_scene to the
# bomber scene in the runner checkout only (never committed).

on:
  workflow_run:
    workflows: ["CI"] # must match the `name:` in ci.yml
    types: [completed]
    branches: [main]
  workflow_dispatch: # allow manual redeploys

concurrency:
  group: itch-demo
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6 # drives the export_templates dir name (4.6.stable)

jobs:
  deploy:
    name: "Export Web & push to itch.io"
    # Skip unless the triggering CI run passed. workflow_dispatch has no
    # workflow_run payload, so allow that path explicitly.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04 # 24.04 required for Godot 4
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # On workflow_run the default checkout is the workflow file's commit;
          # pin to the exact SHA that passed CI.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Setup (relocate export templates + editor config)
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Install Godot runtime libraries
        run: |
          apt-get update
          apt-get install -y --no-install-recommends libfontconfig1

      - name: Swap main scene to Bomber
        run: |
          sed -i \
            's#^run/main_scene=.*#run/main_scene="uid://3a3852p4fypv"#' \
            project.godot
          grep 'run/main_scene="uid://3a3852p4fypv"' project.godot

      - name: Disable editor plugins for export
        run: |
          sed -i \
            's#^enabled=PackedStringArray.*#enabled=PackedStringArray()#' \
            project.godot
          grep 'enabled=PackedStringArray()' project.godot

      - name: Import resources
        run: godot --headless --import || true

      - name: Export Web (Bomber)
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"

          # Godot 4.6 segfaults during editor teardown on this headless export
          # (signal 11 / CRASH_BAD_INDEX in cowdata.h, right after
          # "[ DONE ] savepack"). It is an engine-side teardown bug in
          # GDExtensionManager / SceneTree cleanup, not our code
          # (godotengine/godot#99284, #81030). The artifacts are fully written
          # before the crash, so we tolerate a non-zero exit ONLY when the export
          # provably completed: the "[ DONE ] savepack" marker is present AND the
          # output files exist and are non-empty. Anything that fails earlier (a
          # script parse error, a missing template, an unresolved class) dies
          # before savepack, fails both checks, and correctly fails the job.
          #
          # No `set -o pipefail`: the step runs under `bash -e`, and pipefail
          # would let the failing `godot | tee` pipe abort the step before the
          # check below. Without it the pipe exits via tee (0), and PIPESTATUS[0]
          # still carries Godot's real exit code.
          godot --headless --verbose --export-release \
            "Web" "$EXPORT_DIR/web/index.html" 2>&1 | tee export.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            if grep -q '\[ DONE \] savepack' export.log \
                && [ -s build/web/index.wasm ] && [ -s build/web/index.pck ]; then
              echo "::warning::Godot exited $status (known teardown crash," \
                   "godot#99284/#81030) but the Web export completed; proceeding."
            else
              echo "::error::Web export failed before completion (exit $status)."
              exit "$status"
            fi
          fi
          ls -l build/web

      - name: Publish to itch.io
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: html
          ITCH_GAME: bomber
          ITCH_USER: diejor
          PACKAGE: build/web # push the folder; butler diffs it
          VERSION: ${{ github.event.workflow_run.head_sha || github.sha }}
